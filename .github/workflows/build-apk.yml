name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create release keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore release.jks \
            -alias release -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass plainapp -keypass plainapp \
            -dname "CN=PlainApp,O=PlainApp,C=US"
          echo "storeFile=release.jks" > keystore.properties
          echo "keyAlias=release" >> keystore.properties
          echo "storePassword=plainapp" >> keystore.properties
          echo "keyPassword=plainapp" >> keystore.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleGithubRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plain-app-github-release
          path: app/build/outputs/apk/github/release/*.apk
